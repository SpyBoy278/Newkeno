<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Web Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Keno Web Game</h1>
        <p>Select your numbers (1–20 numbers):</p>
        <div id="numbers-grid"></div>

        <div class="bet-section">
            <label>Bet Amount ($0.2 – $500): </label>
            <input type="number" id="bet-amount" value="10" min="0.2" max="500" step="0.2">
        </div>

        <button id="play-btn">Play</button>

        <div id="results"></div>
        <div id="drawn-numbers"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
